<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Handwritten Digit Detector</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1f4037,#99f2c8);
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.main{
display:flex;
gap:25px;
margin-top:20px;
flex-wrap:wrap;
justify-content:center;
}

canvas{
border:4px solid #111;
background:black;
border-radius:10px;
cursor:crosshair;
}

.panel{
background:#222;
padding:20px;
border-radius:12px;
width:240px;
text-align:center;
}

#prediction{
font-size:70px;
color:#00ffcc;
font-weight:bold;
}

.bar{
height:10px;
background:#444;
margin:5px 0;
border-radius:5px;
overflow:hidden;
}

.bar-fill{
height:100%;
background:#00ffcc;
}

button{
padding:10px;
background:#ff5c5c;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:15px;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

</style>
</head>

<body>

<div id="loading">Loading AI Model...</div>

<h2>AI Digit Detector</h2>
<p>Draw a number between 0-9</p>

<div class="main">

<canvas id="canvas" width="280" height="280"></canvas>

<div class="panel">

<div>Best Prediction</div>
<div id="prediction">-</div>

<div id="top3"></div>

<button onclick="clearCanvas()">Clear</button>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let model
let drawing=false
let hasDrawn=false

async function loadModel(){

model=await tf.loadLayersModel(
"https://storage.googleapis.com/tfjs-models/tfjs/mnist_transfer_cnn_v1/model.json"
)

model.predict(tf.zeros([1,28,28,1])).dispose()

document.getElementById("loading").style.display="none"

}

function preprocess(){

return tf.tidy(()=>{

let img=tf.browser.fromPixels(canvas,1)

img=tf.image.resizeBilinear(img,[28,28])

img=img.toFloat().div(255)

return img.expandDims(0)

})

}

function predict(){

if(!hasDrawn)return

const input=preprocess()

const preds=model.predict(input).dataSync()

let arr=[...preds]

let sorted=arr
.map((v,i)=>({digit:i,prob:v}))
.sort((a,b)=>b.prob-a.prob)

document.getElementById("prediction").innerText=sorted[0].digit

let html="Top Predictions"

for(let i=0;i<3;i++){

let p=(sorted[i].prob*100).toFixed(1)

html+=`

<div>${sorted[i].digit} (${p}%)</div>

<div class="bar">
<div class="bar-fill" style="width:${p}%"></div>
</div>

`

}

document.getElementById("top3").innerHTML=html

}

function start(e){

drawing=true
hasDrawn=true

ctx.lineWidth=20
ctx.lineCap="round"
ctx.strokeStyle="white"

draw(e)

}

function draw(e){

if(!drawing)return

const rect=canvas.getBoundingClientRect()

const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top

ctx.lineTo(x,y)
ctx.stroke()
ctx.beginPath()
ctx.moveTo(x,y)

}

function stop(){

drawing=false
ctx.beginPath()

predict()

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

document.getElementById("prediction").innerText="-"
document.getElementById("top3").innerHTML=""

hasDrawn=false

}

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mousemove",draw)
window.addEventListener("mouseup",stop)

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",draw)
window.addEventListener("touchend",stop)

loadModel()

</script>

</body>
</html>
