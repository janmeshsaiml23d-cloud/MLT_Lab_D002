<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Sentiment Analyzer</title>

<style>
body{
font-family: Arial;
background:#f2f4f8;
max-width:750px;
margin:40px auto;
}

.panel{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

textarea{
width:100%;
height:90px;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2c7be5;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:20px;
padding:15px;
border-radius:8px;
display:none;
}

.positive{background:#e9f9ee;border-left:6px solid #27ae60;}
.negative{background:#fdeaea;border-left:6px solid #e74c3c;}
.neutral{background:#eef1f5;border-left:6px solid #7f8c8d;}

.wordBox{
margin-top:10px;
font-size:14px;
color:#555;
}
</style>

</head>

<body>

<div class="panel">

<h2>Smart Sentiment Analyzer</h2>
<p>Enter any sentence to detect emotional tone.</p>

<textarea id="inputText" placeholder="Example: The product is good but delivery was slow"></textarea>

<button onclick="analyze()">Analyze Text</button>

<div id="result" class="result">

<h3 id="emoji"></h3>

<div id="sentiment"></div>

<div id="score"></div>

<div class="wordBox">
<strong>Detected Keywords:</strong>
<div id="words"></div>
</div>

<div class="wordBox">
<strong>Explanation:</strong>
<div id="explanation"></div>
</div>

</div>

</div>

<script>

// Word score dictionary
const sentimentDictionary = {

positive:{
good:2,
great:3,
excellent:4,
amazing:4,
love:3,
happy:3,
nice:2,
wonderful:4
},

negative:{
bad:-2,
terrible:-4,
awful:-4,
hate:-3,
poor:-2,
worst:-4,
angry:-3,
disappointed:-3
}

};

function clean(text){
return text
.toLowerCase()
.replace(/[^\w\s]/g,'')
.split(/\s+/);
}

function analyze(){

const input=document.getElementById("inputText").value;
if(!input.trim()) return;

const words=clean(input);

let score=0;
let detected=[];

words.forEach(word=>{

if(sentimentDictionary.positive[word]){
score+=sentimentDictionary.positive[word];
detected.push(word);
}

if(sentimentDictionary.negative[word]){
score+=sentimentDictionary.negative[word];
detected.push(word);
}

});

let sentiment="neutral";
let emoji="😐";
let explanation="The sentence contains balanced or unclear emotional signals.";

if(score>1){
sentiment="positive";
emoji="😊";
explanation="More positive keywords were detected in the sentence.";
}

if(score<-1){
sentiment="negative";
emoji="😡";
explanation="More negative keywords were detected in the sentence.";
}

const resultBox=document.getElementById("result");

resultBox.style.display="block";
resultBox.className="result "+sentiment;

document.getElementById("emoji").innerText=emoji;

document.getElementById("sentiment").innerHTML=
"<b>Sentiment:</b> "+sentiment.toUpperCase();

document.getElementById("score").innerHTML=
"<b>Sentiment Score:</b> "+score;

document.getElementById("words").innerText=
detected.length ? detected.join(", ") : "No strong sentiment words found.";

document.getElementById("explanation").innerText=explanation;

}

</script>

</body>
</html>
